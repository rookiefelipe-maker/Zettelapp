<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0d1117" />
  <title>Zettel</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #000000;
      --bg2:         #161b22;
      --bg3:         #1c2128;
      --bg4:         #21262d;
      --blue:        #58a6ff;
      --blue-dim:    #388bfd;
      --blue-bg:     rgba(88,166,255,0.1);
      --blue-border: rgba(88,166,255,0.25);
      --red:         #e0245e;
      --border:      rgba(88,166,255,0.08);
      --border2:     rgba(88,166,255,0.18);
      --text-1:      #e6edf3;
      --text-2:      #8b949e;
      --text-3:      #484f58;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      color: var(--text-1);
    }

    /* ── APP ── */
    #app {
      width: 100%; height: 100dvh;
      display: flex; flex-direction: column;
      overflow: hidden; position: relative;
    }

    /* ── STATUS BAR ── */
    .status-bar {
      padding: env(safe-area-inset-top,12px) 20px 0;
      height: calc(env(safe-area-inset-top,0px) + 40px);
      display: flex; align-items: flex-end; justify-content: space-between;
      flex-shrink: 0;
    }
    .status-time { font-size: 14px; font-weight: 500; color: var(--text-1); }
    .status-icons { display: flex; gap: 5px; align-items: center; }
    .status-icons svg { fill: var(--text-1); }

    /* ── HEADER ── */
    .header {
      padding: 8px 20px 10px;
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }
    .app-name { font-family:'DM Serif Display',serif; font-size:26px; color:var(--text-1); font-weight:400; }
    .header-avatar {
      width:34px; height:34px; border-radius:50%;
      background:var(--blue-dim);
      display:flex; align-items:center; justify-content:center;
      font-size:13px; font-weight:500; color:#fff;
    }

    /* ── CALENDAR ── */
    #calendarSection { flex-shrink:0; padding:0 16px 8px; }
    .cal-nav-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .cal-month-label { font-size:11px; font-weight:500; color:var(--text-2); letter-spacing:.12em; text-transform:uppercase; }
    .cal-nav-btns { display:flex; gap:2px; }
    .cal-nav-btn {
      background:none; border:none; color:var(--text-3);
      width:30px; height:30px; border-radius:50%; cursor:pointer;
      display:flex; align-items:center; justify-content:center; font-size:18px;
    }
    .cal-nav-btn:active { background:var(--bg3); color:var(--text-1); }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); }
    .cal-dow { text-align:center; font-size:10px; color:var(--text-3); font-weight:500; padding:0 0 6px; letter-spacing:.05em; text-transform:uppercase; }
    .cal-day { display:flex; flex-direction:column; align-items:center; padding:2px 0 4px; border-radius:10px; gap:3px; }
    .cal-day.clickable { cursor:pointer; }
    .cal-day.clickable:active { background:var(--bg3); }
    .cal-day-num { font-size:13px; color:var(--text-3); font-weight:400; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
    .cal-day.today .cal-day-num { background:var(--blue); color:#fff; font-weight:500; }
    .cal-day.has-note .cal-day-num { color:var(--text-1); }
    .cal-day.other-month .cal-day-num { color:var(--text-3); opacity:.3; }
    .cal-dots { display:flex; gap:2px; height:5px; align-items:center; }
    .cal-dot { width:4px; height:4px; border-radius:50%; background:var(--blue); }

    /* ── BOTTOM SHEET ── */
    #sheet {
      position:absolute; left:0; right:0; bottom:0;
      background:var(--bg2);
      border-radius:24px 24px 0 0;
      border-top:1px solid var(--border2);
      display:flex; flex-direction:column;
      overflow:hidden; will-change:height;
    }
    .sheet-handle-wrap { padding:10px 0 4px; display:flex; justify-content:center; flex-shrink:0; cursor:pointer; touch-action:none; }
    .sheet-handle { width:38px; height:4px; background:var(--bg4); border-radius:2px; }
    .sheet-header { display:flex; justify-content:space-between; align-items:center; padding:0 18px 10px; flex-shrink:0; }
    .sheet-title { font-size:14px; font-weight:500; color:var(--text-1); }
    .sheet-meta { font-size:11px; color:var(--text-3); }
    .notes-list {
      overflow-y:auto; flex:1; padding:0 12px 90px;
      scrollbar-width:none; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; touch-action:pan-y;
    }
    .notes-list::-webkit-scrollbar { display:none; }

    /* ── NOTE CARD ── */
    .note-card { background:var(--bg3); border:1px solid var(--border); border-radius:14px; padding:14px 15px; margin-bottom:9px; cursor:pointer; user-select:none; }
    .note-card:active { background:var(--bg4); border-color:var(--border2); }
    .nc-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:5px; gap:8px; }
    .nc-title { font-size:14px; font-weight:500; color:var(--text-1); line-height:1.3; flex:1; }
    .nc-date { font-size:10px; color:var(--blue); flex-shrink:0; opacity:.8; }
    .nc-body { font-size:12px; color:var(--text-2); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .nc-tags { display:flex; gap:5px; margin-top:9px; flex-wrap:wrap; }
    .nc-tag { font-size:10px; padding:2px 8px; border-radius:20px; background:var(--blue-bg); color:var(--blue); border:1px solid var(--blue-border); }

    /* ── FAB ── */
    .fab {
      position:absolute; right:20px; bottom:26px;
      width:54px; height:54px; border-radius:50%;
      background:var(--blue-dim); border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:28px; color:#fff; font-weight:300; line-height:1;
      z-index:20; box-shadow:0 4px 20px rgba(56,139,253,.4);
    }
    .fab:active { transform:scale(.93); }

    /* ── OVERLAY ── */
    .overlay {
      position:fixed; inset:0;
      background:rgba(1,4,9,.85);
      z-index:50; display:none;
      backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
    }
    .overlay.active { display:block; }

    /* ── MODAL WRAPPERS ── */
    .modal-wrap { position:fixed; left:0; right:0; z-index:55; display:none; padding:0 12px; }
    .modal-wrap.active { display:block; }
    #newNoteWrap { bottom:0; padding:0; }
    #detailWrap { top:50%; transform:translateY(-50%); }
    #dayWrap    { top:50%; transform:translateY(-50%); }

    /* ── NEW NOTE MODAL ── */
    .note-modal {
      background:var(--bg2); border:1px solid var(--border2);
      border-radius:20px 20px 0 0; width:100%;
      animation:slideUp .22s cubic-bezier(.4,0,.2,1);
      padding-bottom:env(safe-area-inset-bottom,8px);
    }
    @keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
    .nm-header { display:flex; justify-content:space-between; align-items:center; padding:14px 16px 10px; border-bottom:1px solid var(--border); }
    .nm-label { font-size:11px; font-weight:500; color:var(--text-3); letter-spacing:.08em; text-transform:uppercase; }
    .btn-x { background:none; border:none; color:var(--text-3); font-size:18px; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .btn-x:active { background:var(--bg4); color:var(--text-1); }
    .nm-body { padding:12px 16px 0; }
    .field-title { width:100%; background:none; border:none; font-family:'DM Serif Display',serif; font-size:20px; color:var(--text-1); outline:none; margin-bottom:10px; padding:0; }
    .field-title::placeholder { color:var(--text-3); }
    .field-textarea { width:100%; background:none; border:none; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text-2); outline:none; resize:none; line-height:1.6; padding:0; height:90px; }
    .field-textarea::placeholder { color:var(--text-3); }
    .nm-footer { display:flex; justify-content:space-between; align-items:center; padding:10px 16px 14px; border-top:1px solid var(--border); margin-top:10px; }
    .char-count { font-size:11px; color:var(--text-3); }
    .btn-save { background:var(--blue-dim); border:none; border-radius:20px; padding:9px 22px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; color:#fff; cursor:pointer; }
    .btn-save:active { opacity:.8; }

    /* ── DETAIL / DAY MODAL ── */
    .modal-box { background:var(--bg2); border:1px solid var(--border2); border-radius:20px; width:100%; max-height:75dvh; overflow-y:auto; padding:20px; scrollbar-width:none; animation:popIn .2s cubic-bezier(.34,1.4,.64,1); -webkit-overflow-scrolling:touch; }
    .modal-box::-webkit-scrollbar { display:none; }
    @keyframes popIn { from{opacity:0;transform:scale(.9)} to{opacity:1;transform:scale(1)} }
    .modal-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:5px; gap:10px; }
    .detail-title { font-family:'DM Serif Display',serif; font-size:20px; color:var(--text-1); font-weight:400; line-height:1.25; flex:1; }
    .detail-date { font-size:11px; color:var(--blue); margin-bottom:14px; opacity:.8; }
    .detail-body { font-size:14px; color:var(--text-2); line-height:1.7; }
    .wikilink { color:var(--blue); cursor:pointer; border-bottom:1px solid var(--blue-border); }
    .wikilink:active { opacity:.7; }
    .divider { height:1px; background:var(--border); margin:16px 0; }
    .detail-actions { display:flex; gap:8px; }
    .btn-edit { flex:1; background:var(--blue-bg); border:1px solid var(--blue-border); border-radius:10px; padding:11px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; color:var(--blue); cursor:pointer; }
    .btn-edit:active { opacity:.7; }
    .btn-delete { flex:1; background:rgba(224,36,94,.08); border:1px solid rgba(224,36,94,.2); border-radius:10px; padding:11px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; color:var(--red); cursor:pointer; }
    .btn-delete:active { opacity:.7; }
    .day-note-item { background:var(--bg3); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:8px; cursor:pointer; }
    .day-note-item:active { border-color:var(--blue); }
    .day-note-item:last-child { margin-bottom:0; }
    .dni-title { font-size:14px; font-weight:500; color:var(--text-1); margin-bottom:3px; }
    .dni-preview { font-size:12px; color:var(--text-3); }

    /* ── TOAST ── */
    .toast { position:fixed; bottom:110px; left:50%; transform:translateX(-50%); background:var(--bg4); border:1px solid var(--border2); border-radius:20px; padding:8px 18px; font-size:12px; color:var(--text-2); z-index:70; opacity:0; pointer-events:none; transition:opacity .2s; white-space:nowrap; }
    .toast.show { opacity:1; }
  </style>
</head>
<body>
<div id="app">
  <!-- STATUS BAR -->
  <div class="status-bar">
    <span class="status-time" id="clock">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="3" width="3" height="9" rx="1"/><rect x="4.5" y="2" width="3" height="10" rx="1"/><rect x="9" y="0" width="3" height="12" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1" opacity="0.3"/></svg>
      <svg width="16" height="12" viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="2.5" stroke="currentColor" stroke-width="1.2" fill="none"/><rect x="22.5" y="4" width="2.5" height="4" rx="1" fill="currentColor" opacity="0.5"/><rect x="1.5" y="2.5" width="15" height="7" rx="1.5" fill="currentColor"/></svg>
    </div>
  </div>

  <!-- HEADER -->
  <div class="header">
    <div class="app-name">Zettel</div>
    <div class="header-avatar">F</div>
  </div>

  <!-- CALENDAR -->
  <div id="calendarSection">
    <div class="cal-nav-row">
      <span class="cal-month-label" id="calMonthLabel">APRIL 2026</span>
      <div class="cal-nav-btns">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">&#8249;</button>
        <button class="cal-nav-btn" onclick="changeMonth(1)">&#8250;</button>
      </div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- BOTTOM SHEET -->
  <div id="sheet">
    <div class="sheet-handle-wrap" id="sheetHandle">
      <div class="sheet-handle"></div>
    </div>
    <div class="sheet-header">
      <span class="sheet-title">Notes</span>
      <span class="sheet-meta" id="notesCount">10 notes</span>
    </div>
    <div class="notes-list" id="notesList"></div>
  </div>

  <!-- FAB -->
  <button class="fab" id="fab">+</button>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<!-- NEW NOTE (keyboard-aware, bottom anchored) -->
<div class="modal-wrap" id="newNoteWrap">
  <div class="note-modal" id="newNoteModal">
    <div class="nm-header">
      <span class="nm-label">New note</span>
      <button class="btn-x" onclick="closeAll()">✕</button>
    </div>
    <div class="nm-body">
      <input class="field-title" id="noteTitle" type="text" placeholder="Title..." autocomplete="off" />
      <textarea class="field-textarea" id="noteBody" placeholder="Write here..."></textarea>
    </div>
    <div class="nm-footer">
      <span class="char-count" id="charCount">0 / 500</span>
      <button class="btn-save" id="btnSave" onclick="saveNote()">Save</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-wrap" id="detailWrap">
  <div class="modal-box">
    <div class="modal-header">
      <div class="detail-title" id="detailTitle"></div>
      <button class="btn-x" onclick="closeAll()">✕</button>
    </div>
    <div class="detail-date" id="detailDate"></div>
    <div class="detail-body" id="detailBody"></div>
    <div class="divider"></div>
    <div class="detail-actions">
      <button class="btn-edit" onclick="editNote()">✎  Edit</button>
      <button class="btn-delete" onclick="deleteNote()">✕  Delete</button>
    </div>
  </div>
</div>

<!-- DAY MODAL -->
<div class="modal-wrap" id="dayWrap">
  <div class="modal-box">
    <div class="modal-header">
      <div class="detail-title" id="dayModalTitle" style="font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;"></div>
      <button class="btn-x" onclick="closeAll()">✕</button>
    </div>
    <div id="dayNotesList"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW = ['Su','Mo','Tu','We','Th','Fr','Sa'];

let notes = [
  {id:1, title:'The Obstacle Is the Way', date:'2026-04-09', body:'Ryan Holiday argues that obstacles are not just things to overcome — they are the way itself. "The impediment to action advances action." See also [[Memento Mori]] for the related Stoic idea.', tags:['stoicism','ryan holiday']},
  {id:2, title:'Atomic Habits — Identity Change', date:'2026-04-09', body:'James Clear: every action is a vote for the type of person you want to become. Focus on who you are becoming. Related to [[The Obstacle Is the Way]].', tags:['habits','identity']},
  {id:3, title:'The Algebra of Happiness', date:'2026-04-08', body:'Scott Galloway: joy = achievement × relationships. Success without people to share it with is hollow. Time is the only non-renewable resource.', tags:['happiness','life']},
  {id:4, title:'Memento Mori', date:'2026-04-07', body:'The Stoic practice of meditating on death — not to be morbid but to clarify what matters. "You could leave life right now. Let that determine what you do." — Marcus Aurelius.', tags:['stoicism','philosophy']},
  {id:5, title:'Deep Work — Focused Success', date:'2026-04-06', body:'Cal Newport: the ability to focus without distraction is becoming rare and valuable simultaneously. Shallow work is distraction masquerading as productivity.', tags:['productivity','newport']},
  {id:6, title:'48 Laws of Power — Law 1', date:'2026-04-05', body:'Never outshine the master. Make those above you feel comfortably superior. The insecure master will find many reasons to punish the one who makes him feel lesser. — Robert Greene.', tags:['power','greene']},
  {id:7, title:'100M Offers — Value Equation', date:'2026-04-04', body:'Alex Hormozi: value = (dream outcome × perceived likelihood) / (time delay × effort). Stack the numerator, crush the denominator. Price is only an issue in the absence of value.', tags:['business','hormozi']},
  {id:8, title:'Antifragile Systems', date:'2026-04-03', body:'Nassim Taleb: some things benefit from shocks and disorder. The opposite of fragile is not robust — it is antifragile. Design your life to gain from volatility.', tags:['taleb','systems']},
  {id:9, title:'Designing Your Life — Workview', date:'2026-04-02', body:'Bill Burnett: a workview is your philosophy of why you work — not what you do but why it matters beyond money. Build a life by design, not by default.', tags:['design thinking','burnett']},
  {id:10, title:'The Mountain Is You', date:'2026-04-01', body:'Brianna Wiest: self-sabotage happens when you have two conflicting desires. One part wants change, one part fears it. The mountain you keep carrying is the one you were supposed to climb.', tags:['psychology','wiest']},
];

let nextId = 11;
let currentNoteId = null;
let currentMonth = new Date(2026, 3, 1);
let isExpanded = false;
const COLLAPSED_H = 280;

/* ── CLOCK ── */
function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent = n.getHours() + ':' + String(n.getMinutes()).padStart(2,'0');
}
updateClock(); setInterval(updateClock, 30000);

/* ── SHEET ── */
function setSheetH(h, animate) {
  const s = document.getElementById('sheet');
  s.style.transition = animate ? 'height .35s cubic-bezier(.4,0,.2,1)' : 'none';
  s.style.height = h + 'px';
}
function collapseSheet(animate) {
  isExpanded = false;
  setSheetH(COLLAPSED_H, animate);
  renderNotes();
}
function expandSheet(animate) {
  isExpanded = true;
  setSheetH(window.innerHeight, animate);
  renderNotes();
}

/* swipe gesture */
let dragY0 = null, dragH0 = null;
const handle = document.getElementById('sheetHandle');
handle.addEventListener('touchstart', e => {
  dragY0 = e.touches[0].clientY;
  dragH0 = parseInt(document.getElementById('sheet').style.height) || COLLAPSED_H;
}, {passive:true});
handle.addEventListener('touchmove', e => {
  if (dragY0 === null) return;
  const dy = dragY0 - e.touches[0].clientY;
  const newH = Math.min(window.innerHeight, Math.max(120, dragH0 + dy));
  setSheetH(newH, false);
  e.preventDefault();
}, {passive:false});
handle.addEventListener('touchend', e => {
  if (dragY0 === null) return;
  const dy = dragY0 - e.changedTouches[0].clientY;
  dragY0 = null;
  if (dy > 60) expandSheet(true);
  else if (dy < -60) collapseSheet(true);
  else isExpanded ? expandSheet(true) : collapseSheet(true);
});
handle.addEventListener('click', () => isExpanded ? collapseSheet(true) : expandSheet(true));

/* ── KEYBOARD-AWARE MODAL ── */
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', adjustKbd);
  window.visualViewport.addEventListener('scroll', adjustKbd);
}
function adjustKbd() {
  const wrap = document.getElementById('newNoteWrap');
  if (!wrap.classList.contains('active')) return;
  const vv = window.visualViewport;
  const gap = window.innerHeight - (vv.offsetTop + vv.height);
  wrap.style.bottom = Math.max(0, gap) + 'px';
}

/* ── CALENDAR ── */
function notesOnDay(y, m, d) {
  const k = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  return notes.filter(n => n.date === k);
}
function renderCalendar() {
  const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
  document.getElementById('calMonthLabel').textContent = `${MONTHS[m].toUpperCase()} ${y}`;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  DOW.forEach(d => { const el = document.createElement('div'); el.className='cal-dow'; el.textContent=d; grid.appendChild(el); });
  const firstDay = new Date(y,m,1).getDay();
  const dim = new Date(y,m+1,0).getDate();
  const prev = new Date(y,m,0).getDate();
  const today = new Date();
  for (let i=0; i<firstDay; i++) {
    const el = document.createElement('div');
    el.className='cal-day other-month';
    el.innerHTML=`<div class="cal-day-num">${prev-firstDay+i+1}</div><div class="cal-dots"></div>`;
    grid.appendChild(el);
  }
  for (let d=1; d<=dim; d++) {
    const el = document.createElement('div');
    const dn = notesOnDay(y,m,d);
    const isToday = today.getFullYear()===y && today.getMonth()===m && today.getDate()===d;
    let cls = 'cal-day';
    if (isToday) cls += ' today';
    if (dn.length) cls += ' has-note clickable';
    el.className = cls;
    const dots = dn.length ? `<div class="cal-dots">${Array.from({length:Math.min(dn.length,3)},()=>'<div class="cal-dot"></div>').join('')}</div>` : '<div class="cal-dots"></div>';
    el.innerHTML = `<div class="cal-day-num">${d}</div>${dots}`;
    if (dn.length) el.addEventListener('click', () => openDayModal(y,m,d,dn));
    grid.appendChild(el);
  }
  const rem = 7-((firstDay+dim)%7);
  if (rem<7) for (let d=1; d<=rem; d++) {
    const el = document.createElement('div');
    el.className='cal-day other-month';
    el.innerHTML=`<div class="cal-day-num">${d}</div><div class="cal-dots"></div>`;
    grid.appendChild(el);
  }
}
function changeMonth(dir) { currentMonth.setMonth(currentMonth.getMonth()+dir); renderCalendar(); }

/* ── NOTES LIST ── */
function renderNotes() {
  const list = document.getElementById('notesList');
  const visible = isExpanded ? notes : notes.slice(0,3);
  list.innerHTML = '';
  visible.forEach(note => {
    const card = document.createElement('div');
    card.className = 'note-card';
    const d = note.date.split('-');
    const dateLabel = `${MONTHS[parseInt(d[1])-1].slice(0,3)} ${parseInt(d[2])}`;
    const tags = note.tags.map(t=>`<span class="nc-tag">#${t}</span>`).join('');
    card.innerHTML = `
      <div class="nc-top"><div class="nc-title">${note.title}</div><div class="nc-date">${dateLabel}</div></div>
      <div class="nc-body">${note.body.replace(/\[\[(.+?)\]\]/g,'$1')}</div>
      ${tags?`<div class="nc-tags">${tags}</div>`:''}
    `;
    card.addEventListener('click', () => openDetail(note.id));
    list.appendChild(card);
  });
  document.getElementById('notesCount').textContent = `${notes.length} notes`;
}

/* ── FAB ── */
document.getElementById('fab').addEventListener('click', openNewNote);
function openNewNote() {
  document.getElementById('noteTitle').value = '';
  document.getElementById('noteBody').value = '';
  document.getElementById('charCount').textContent = '0 / 500';
  document.getElementById('btnSave').onclick = saveNote;
  showModal('newNoteWrap');
  requestAnimationFrame(() => document.getElementById('noteTitle').focus());
}

document.getElementById('noteBody').addEventListener('input', function() {
  if (this.value.length > 500) this.value = this.value.slice(0,500);
  document.getElementById('charCount').textContent = `${this.value.length} / 500`;
});

function saveNote() {
  const title = document.getElementById('noteTitle').value.trim();
  const body  = document.getElementById('noteBody').value.trim();
  if (!title) { showToast('Add a title first'); return; }
  const t = new Date();
  const ds = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  notes.unshift({id:nextId++, title, date:ds, body, tags:[]});
  closeAll(); renderNotes(); renderCalendar(); showToast('Note saved ✓');
}

/* ── DETAIL ── */
function openDetail(id) {
  currentNoteId = id;
  const note = notes.find(n=>n.id===id);
  if (!note) return;
  document.getElementById('detailTitle').textContent = note.title;
  const d = note.date.split('-');
  document.getElementById('detailDate').textContent = `${MONTHS[parseInt(d[1])-1]} ${parseInt(d[2])}, ${d[0]}`;
  const bodyHtml = note.body.replace(/\[\[(.+?)\]\]/g, (_,name)=>{
    const linked = notes.find(n=>n.title.toLowerCase().includes(name.toLowerCase()));
    return linked
      ? `<span class="wikilink" onclick="event.stopPropagation();closeAll();setTimeout(()=>openDetail(${linked.id}),80)">[[${name}]]</span>`
      : `<span style="color:var(--text-3)">[[${name}]]</span>`;
  });
  document.getElementById('detailBody').innerHTML = bodyHtml;
  showModal('detailWrap');
}

function editNote() {
  const note = notes.find(n=>n.id===currentNoteId);
  if (!note) return;
  closeAll();
  setTimeout(()=>{
    document.getElementById('noteTitle').value = note.title;
    document.getElementById('noteBody').value = note.body;
    document.getElementById('charCount').textContent = `${note.body.length} / 500`;
    document.getElementById('btnSave').onclick = () => {
      const title = document.getElementById('noteTitle').value.trim();
      const body  = document.getElementById('noteBody').value.trim();
      if (!title) { showToast('Add a title first'); return; }
      note.title = title; note.body = body;
      closeAll(); renderNotes(); renderCalendar(); showToast('Note updated ✓');
    };
    showModal('newNoteWrap');
    requestAnimationFrame(()=>document.getElementById('noteTitle').focus());
  }, 80);
}

function deleteNote() {
  notes = notes.filter(n=>n.id!==currentNoteId);
  closeAll(); renderNotes(); renderCalendar(); showToast('Note deleted');
}

/* ── DAY MODAL ── */
function openDayModal(y, m, d, dayNotes) {
  document.getElementById('dayModalTitle').textContent = `${MONTHS[m]} ${d} · ${dayNotes.length} note${dayNotes.length>1?'s':''}`;
  const list = document.getElementById('dayNotesList');
  list.innerHTML = '';
  dayNotes.forEach(note=>{
    const el = document.createElement('div');
    el.className = 'day-note-item';
    el.innerHTML = `<div class="dni-title">${note.title}</div><div class="dni-preview">${note.body.replace(/\[\[.*?\]\]/g,m=>m.slice(2,-2)).slice(0,70)}…</div>`;
    el.addEventListener('click', ()=>{ closeAll(); setTimeout(()=>openDetail(note.id),80); });
    list.appendChild(el);
  });
  showModal('dayWrap');
}

/* ── MODAL HELPERS ── */
function showModal(id) {
  document.getElementById('overlay').classList.add('active');
  ['newNoteWrap','detailWrap','dayWrap'].forEach(mid=>{
    const el = document.getElementById(mid);
    if (mid===id) { el.classList.add('active'); if (mid==='newNoteWrap') el.style.bottom='0'; }
    else el.classList.remove('active');
  });
}
function closeAll() {
  document.getElementById('overlay').classList.remove('active');
  ['newNoteWrap','detailWrap','dayWrap'].forEach(mid=>document.getElementById(mid).classList.remove('active'));
  document.activeElement?.blur();
}
document.getElementById('overlay').addEventListener('click', closeAll);

/* ── TOAST ── */
let toastT;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ── INIT ── */
renderCalendar();
collapseSheet(false);
</script>
